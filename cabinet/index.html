<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <title>Begemot VPN</title>
    <meta name="description" content="Begemot VPN — личный кабинет: подписка, устройства и тарифы" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (function () {
        // Разворачиваем Mini App на весь экран сразу, до рендера React.
        try {
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) {
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.ready();
            // Применяем тему Telegram (чтобы не было мигания при FOUC).
            var tgScheme = window.Telegram.WebApp.colorScheme;
            if (tgScheme) {
              document.documentElement.classList.add("theme-" + tgScheme);
              document.documentElement.style.colorScheme = tgScheme;
              document.documentElement.dataset.themeMode = tgScheme;
            }
          } else {
            // Обычный браузер — применяем сохранённую тему.
            var stored = localStorage.getItem("cabinet-theme");
            var mode = stored || "system";
            var resolved = mode;
            if (mode === "system") {
              resolved = window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
            }
            document.documentElement.classList.add("theme-" + resolved);
            document.documentElement.style.colorScheme = resolved;
            document.documentElement.dataset.themeMode = mode;
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
