<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <title>Begemot VPN</title>
    <meta name="description" content="Begemot VPN — личный кабинет: подписка, устройства и тарифы" />
    <script>
      (function () {
        // Применяет тему из localStorage / системную. Используется в обычном браузере.
        function applyStoredTheme() {
          try {
            var stored = localStorage.getItem("cabinet-theme");
            var mode = stored || "system";
            var resolved = mode;
            if (mode === "system") {
              resolved = window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
            }
            document.documentElement.classList.add("theme-" + resolved);
            document.documentElement.style.colorScheme = resolved;
            document.documentElement.dataset.themeMode = mode;
          } catch (e) {}
        }

        // Mini App запускается с параметрами tgWebApp* в hash URL. Только в этом
        // случае нужен SDK Telegram. В обычном браузере НЕ грузим telegram.org —
        // у части операторов он режется DPI и блокирует рендер всей страницы.
        var isMiniApp =
          /tgWebApp/i.test(window.location.hash) ||
          !!window.TelegramWebviewProxy ||
          (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData);

        if (!isMiniApp) {
          applyStoredTheme();
          return;
        }

        // Сообщаем приложению, что SDK Telegram ещё грузится, чтобы оно дождалось.
        window.__tgWebAppExpected = true;
        function settle() {
          window.__tgWebAppSettled = true;
          try {
            window.dispatchEvent(new Event("tg-webapp-settled"));
          } catch (e) {}
        }

        // Mini App: подгружаем SDK асинхронно, инициализируем по загрузке.
        var s = document.createElement("script");
        s.src = "https://telegram.org/js/telegram-web-app.js";
        s.async = true;
        s.onload = function () {
          try {
            var wa = window.Telegram && window.Telegram.WebApp;
            if (wa) {
              wa.expand();
              wa.ready();
              var tgScheme = wa.colorScheme;
              if (tgScheme) {
                document.documentElement.classList.add("theme-" + tgScheme);
                document.documentElement.style.colorScheme = tgScheme;
                document.documentElement.dataset.themeMode = tgScheme;
              }
            } else {
              applyStoredTheme();
            }
          } catch (e) {
            applyStoredTheme();
          }
          settle();
        };
        // Если SDK не загрузился (заблокирован) — не оставляем страницу без темы.
        s.onerror = function () {
          applyStoredTheme();
          settle();
        };
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
