# ВНИМАНИЕ: этот файл — ШАБЛОН nginx (envsubst). Он монтируется/копируется в
# /etc/nginx/templates/default.conf.template, и при старте контейнера официальный
# entrypoint nginx подставляет переменные окружения вида ${API_*} (фильтр
# NGINX_ENVSUBST_FILTER=^API_ в Dockerfile — трогаются ТОЛЬКО переменные с
# префиксом API_, рантайм-переменные nginx ($host, $remote_addr, …) не затрагиваются).
#
#   ${API_UPSTREAM}    — адрес бэкенда бота в формате host:port.
#   ${API_SCHEME}      — http | https (как стучаться к апстриму).
#   ${API_HOST_HEADER} — Host-заголовок и TLS-SNI, отправляемые апстриму.
#
#   Два сценария:
#     • один сервер с ботом (по умолчанию):
#         API_UPSTREAM=remnashop:5000  API_SCHEME=http  API_HOST_HEADER=$host
#         (бот в той же docker-сети, ходим по имени контейнера)
#     • сайт на ОТДЕЛЬНОМ сервере — проксируем на ПУБЛИЧНЫЙ API бота по TLS
#       (никакого WG не нужно, API бота уже опубликован через его reverse-proxy):
#         API_UPSTREAM=bot.example.com:443  API_SCHEME=https  API_HOST_HEADER=bot.example.com
#   Значения задаются через env (см. docker-compose.cabinet.yml / .site.yml, install.sh).
#
# ── Рейт-лимит авторизации (защита от брутфорса) ─────────────────────────────
# Эти директивы — в http-контексте (файл включается внутрь http{} через
# conf.d/*.conf), поэтому стоят ВНЕ server{}.
#
# Лимитируем только брутфорсимые ручки авторизации. Частые легитимные вызовы
# (/auth/me, /auth/refresh, /auth/whoami, /auth/logout) НЕ лимитируются — иначе
# обычная навигация по кабинету ловила бы 429. Ключ пустой → запрос не считается.
# Мапим по $request_uri (оригинальный путь), а НЕ по $uri: rewrite в location
# /api/ меняет $uri на /api/v1/public/... ещё до фазы limit_req, и по $uri map
# уже не совпал бы. $request_uri rewrite не трогает.
map $request_uri $auth_limit_key {
    default                                  "";
    ~^/api/auth/login                        $binary_remote_addr;
    ~^/api/auth/register                     $binary_remote_addr;
    ~^/api/auth/telegram                      $binary_remote_addr;
    ~^/api/auth/password/set                 $binary_remote_addr;
    ~^/api/auth/change-password              $binary_remote_addr;
    ~^/api/auth/email/confirm                $binary_remote_addr;
    ~^/api/auth/email/request-verification   $binary_remote_addr;
}

# 10 запросов/мин на IP к чувствительным ручкам, короткий всплеск до 5.
# 10m зоны хватает примерно на 160k уникальных IP.
limit_req_zone $auth_limit_key zone=auth_limit:10m rate=10r/m;
limit_req_status 429;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS. Нужен, чтобы proxy_pass с переменной резолвил имя
    # контейнера динамически (на каждый запрос), а не один раз при старте nginx.
    # Это устраняет 502 после пересоздания контейнера remnashop (смена IP).
    # Для сайта на отдельном сервере, где API_UPSTREAM — это IP (напр. WG-адрес),
    # DNS не нужен, но директива безвредна (для IP-литерала запрос к DNS не идёт).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Admin API — более специфичный префикс нужно указать ПЕРВЫМ.
    location /api/admin/ {
        # Загрузка логотипа кабинета (multipart) — дефолтный 1m мал.
        client_max_body_size 4m;
        set $upstream_remnashop "${API_UPSTREAM}";
        rewrite ^/api/admin/(.*)$ /api/v1/admin/$1 break;
        proxy_pass ${API_SCHEME}://$upstream_remnashop;
        # Для https-апстрима (сайт на отдельном сервере): SNI + правильный Host,
        # чтобы reverse-proxy бота смаршрутизировал по домену. В http игнорируется.
        proxy_ssl_server_name on;
        proxy_ssl_name ${API_HOST_HEADER};
        proxy_set_header Host ${API_HOST_HEADER};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # Проксируем все API-запросы на бэкенд бота (${API_UPSTREAM}).
    # На одном сервере с ботом это имя контейнера remnashop:5000 (та же docker-сеть,
    # см. docker-compose.cabinet.yml). На отдельном сервере — IP/host бота:5000.
    location /api/ {
        # Рейт-лимит срабатывает только для путей из map выше (auth-брутфорс).
        # burst=5 nodelay — небольшой всплеск без задержки, дальше 429.
        limit_req zone=auth_limit burst=5 nodelay;

        set $upstream_remnashop "${API_UPSTREAM}";
        rewrite ^/api/(.*)$ /api/v1/public/$1 break;
        proxy_pass ${API_SCHEME}://$upstream_remnashop;
        proxy_ssl_server_name on;
        proxy_ssl_name ${API_HOST_HEADER};
        proxy_set_header Host ${API_HOST_HEADER};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # cookie-based auth — куки должны проходить как есть
        proxy_pass_request_headers on;
    }

    # Кэшируем статику с хешами в имени файла (Vite добавляет хеш автоматически)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: все остальные пути отдаём на index.html, роутинг берёт на себя React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
