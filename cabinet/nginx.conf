server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS. Нужен, чтобы proxy_pass с переменной резолвил имя
    # контейнера динамически (на каждый запрос), а не один раз при старте nginx.
    # Это устраняет 502 после пересоздания контейнера remnashop (смена IP).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Admin API — более специфичный префикс нужно указать ПЕРВЫМ.
    location /api/admin/ {
        set $upstream_remnashop remnashop;
        rewrite ^/api/admin/(.*)$ /api/v1/admin/$1 break;
        proxy_pass http://$upstream_remnashop:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # Проксируем все API-запросы на контейнер remnashop.
    # "remnashop" — имя сервиса из docker-compose.yml бота; контейнеры должны быть
    # в одной docker-сети (см. comments в docker-compose.cabinet.yml).
    location /api/ {
        set $upstream_remnashop remnashop;
        rewrite ^/api/(.*)$ /api/v1/public/$1 break;
        proxy_pass http://$upstream_remnashop:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # cookie-based auth — куки должны проходить как есть
        proxy_pass_request_headers on;
    }

    # Кэшируем статику с хешами в имени файла (Vite добавляет хеш автоматически)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: все остальные пути отдаём на index.html, роутинг берёт на себя React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
