<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Открываем приложение…</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f4; color: #1c1917; padding: 24px;
    }
    @media (prefers-color-scheme: dark) { body { background: #1c1917; color: #f5f5f4; } }
    .card { max-width: 380px; text-align: center; }
    h1 { font-size: 18px; margin: 0 0 8px; }
    p { font-size: 14px; opacity: .75; margin: 0 0 20px; line-height: 1.5; }
    a.btn {
      display: inline-block; text-decoration: none; font-weight: 600; font-size: 15px;
      padding: 12px 22px; border-radius: 12px; color: #fff;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Открываем приложение…</h1>
    <p>Если приложение не открылось автоматически — нажмите кнопку ниже.</p>
    <a id="open" class="btn" href="#">Открыть приложение</a>
  </div>
  <script>
    // Диплинк передаётся во фрагменте (#...), чтобы не попадать в логи сервера.
    var link = "";
    try { link = decodeURIComponent((location.hash || "").slice(1)); } catch (e) { link = (location.hash || "").slice(1); }
    if (link) {
      var a = document.getElementById("open");
      a.setAttribute("href", link);
      // Мы уже во внешнем браузере — здесь кастомная схема отдаётся ОС и приложение открывается.
      setTimeout(function () { try { location.href = link; } catch (e) {} }, 60);
    }
  </script>
</body>
</html>
