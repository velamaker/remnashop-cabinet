# Запускать рядом с основным docker-compose.yml бота:
#   docker compose -f docker-compose.yml -f docker-compose.cabinet.yml up -d --build cabinet
#
# Либо добавить сервис "cabinet" прямо в docker-compose.yml бота — тогда
# секцию networks ниже можно убрать (он и так будет в той же сети).

services:
  cabinet:
    build:
      context: ./cabinet
      args:
        VITE_TELEGRAM_BOT_USERNAME: "${TELEGRAM_BOT_USERNAME}"
    container_name: remnashop-cabinet
    restart: unless-stopped
    ports:
      - "127.0.0.1:5002:80"
    volumes:
      # nginx.conf авторитетен из исходника — правки конфига не требуют пересборки
      # образа и переживают пересоздание контейнера.
      - ./cabinet/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default

networks:
  default:
    name: remnawave-network
    external: true
