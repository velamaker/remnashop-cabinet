  <text x="351" y="196" fill="#eef3fb" font-size="30" font-weight="800">399 <tspan font-size="16" fill="#9aa7bd">₽</tspan></text>
  <text x="351" y="218" fill="#65728a" font-size="11">133 ₽ / месяц</text>
  <text x="351" y="252" fill="#cfe0ff" font-size="12">✓ Безлимитный трафик</text>
  <text x="351" y="280" fill="#cfe0ff" font-size="12">✓ До 10 устройств</text>
  <text x="351" y="308" fill="#cfe0ff" font-size="12">✓ Приоритетная поддержка</text>
