  <text x="64" y="196" fill="#eef3fb" font-size="30" font-weight="800">149 <tspan font-size="16" fill="#9aa7bd">₽</tspan></text>
  <text x="64" y="240" fill="#9aa7bd" font-size="12">✓ Безлимитный трафик</text>
  <text x="64" y="268" fill="#9aa7bd" font-size="12">✓ До 5 устройств</text>
  <text x="64" y="296" fill="#9aa7bd" font-size="12">✓ Все локации</text>
  <rect x="64" y="430" width="218" height="38" rx="11" fill="#1a2436"/>
  <text x="173" y="454" fill="#9aa7bd" font-size="13" font-weight="600" text-anchor="middle">Выбрать</text>

  <!-- Plan 2 (highlighted) -->
  <rect x="327" y="98" width="266" height="404" rx="18" fill="#13233f" stroke="#4d8bff" stroke-width="1.5"/>
