<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4d8bff"/><stop offset="1" stop-color="#2bd4ee"/>
    </linearGradient>
  </defs>
  <rect width="920" height="560" rx="14" fill="#0a0d15"/>

  <text x="40" y="58" fill="#eef3fb" font-size="24" font-weight="700">Тарифы</text>
